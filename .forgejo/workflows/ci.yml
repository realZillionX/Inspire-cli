name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: codeberg-small
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Lint
        run: uv run ruff check inspire tests
      - name: Check formatting
        run: uv run black --check inspire tests

  test:
    runs-on: codeberg-small
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Run tests
        run: uv run pytest -x -q --tb=short
