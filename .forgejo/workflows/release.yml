name: Release

on:
  push:
    tags: ['v*']

jobs:
  validate-release:
    runs-on: codeberg-small
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Run tests
        run: uv run pytest -x -q --tb=short
      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"  # Forgejo sets GITHUB_REF_NAME for compatibility
          TOML_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          PY_VERSION=$(grep '__version__' inspire/__init__.py | sed 's/.*"\(.*\)"/\1/')
          echo "Tag: $TAG_VERSION | pyproject.toml: $TOML_VERSION | __init__.py: $PY_VERSION"
          [ "$TAG_VERSION" = "$TOML_VERSION" ] && [ "$TAG_VERSION" = "$PY_VERSION" ] || { echo "Version mismatch!"; exit 1; }
